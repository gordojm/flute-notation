<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wind Instrument Fingering Guide</title>
  </head>
  <body>
    <header id="app-header">
      <h1>Wind Instrument Fingering Guide</h1>
      <label for="instrument-select">Instrument:</label>
      <select id="instrument-select"></select>
    </header>

    <section id="input-section">
      <div id="text-input-row">
        <input
          type="text"
          id="note-input"
          placeholder="Type notes: E4, B4, Ab4"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="clear-btn">Clear</button>
      </div>

      <div id="virtual-keyboard">
        <div id="octave-selector">
          <span>Octave:</span>
          <button class="octave-btn active" data-octave="4">4</button>
          <button class="octave-btn" data-octave="5">5</button>
          <button class="octave-btn" data-octave="6">6</button>
        </div>
        <div id="note-buttons">
          <!-- Populated by renderer.ts -->
        </div>
      </div>
    </section>

    <section id="output-section">
      <div id="vexflow-container"></div>
      <div id="fingering-container"></div>
    </section>

    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
